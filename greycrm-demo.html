<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreyCRM — Demo Interactiva</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f8fafc;height:100vh;overflow:hidden;}
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:240px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0;}
#main{flex:1;overflow:auto;background:#0f172a;}
.section{display:none;}
.sidebar-header{padding:16px;border-bottom:1px solid #334155;display:flex;align-items:center;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#94a3b8;font-size:14px;transition:all 0.15s;}
.nav-item:hover{background:#334155;color:#f8fafc;}
.nav-item.active{background:rgba(59,130,246,0.15);color:#60a5fa;border-left:3px solid #3b82f6;}
.card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;}
.hover-card{transition:transform 0.15s,border-color 0.15s;}
.hover-card:hover{transform:translateY(-2px);border-color:#475569;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity 0.15s;white-space:nowrap;}
.btn:hover{opacity:0.85;}
.btn-primary{background:#3b82f6;color:white;}
.btn-ghost{background:#334155;color:#f8fafc;}
.btn-danger{background:#ef4444;color:white;}
.btn-success{background:#10b981;color:white;}
.btn-warning{background:#f59e0b;color:white;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.input{background:#0f172a;border:1px solid #334155;color:#f8fafc;padding:8px 12px;border-radius:8px;font-size:14px;width:100%;outline:none;transition:border-color 0.15s;}
.input:focus{border-color:#3b82f6;}
.form-label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.table{width:100%;border-collapse:collapse;font-size:13px;}
.table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid #334155;white-space:nowrap;}
.table td{padding:10px 14px;border-bottom:1px solid #1e293b;color:#e2e8f0;vertical-align:middle;}
.table tbody tr:hover{background:#1e293b;}
.tab{background:transparent;border:1px solid #334155;color:#94a3b8;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s;}
.tab:hover{background:#334155;color:#f8fafc;}
.tab-active{background:#334155;color:#f8fafc;border-color:#475569;}
.kanban-col{background:#1e293b;border-radius:12px;padding:16px;min-width:230px;border:1px solid #334155;}
.kanban-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:700;font-size:13px;color:#f8fafc;}
.kanban-card{background:#0f172a;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;border:1px solid #334155;transition:all 0.15s;}
.kanban-card:hover{border-color:#3b82f6;transform:translateY(-1px);}
.conv-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #1e293b;transition:background 0.15s;}
.conv-item:hover{background:#334155;}
.conv-item.active{background:rgba(59,130,246,0.08);border-left:3px solid #3b82f6;}
#toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:8px;pointer-events:none;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9000;align-items:center;justify-content:center;}
#modal-box{background:#1e293b;border-radius:16px;width:90%;max-width:580px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #334155;box-shadow:0 25px 60px rgba(0,0,0,0.5);}
#modal-header{padding:20px 24px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#modal-title{font-weight:700;font-size:16px;color:#f8fafc;}
#modal-body{padding:24px;overflow-y:auto;flex:1;}
#modal-footer{padding:16px 24px;border-top:1px solid #334155;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#0f172a;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
</style>
</head>

// ======================================================
// STATE
// ======================================================
var STATE = null;

function loadState() {
  var s = localStorage.getItem('greycrm_v3');
  STATE = s ? JSON.parse(s) : JSON.parse(JSON.stringify(SEED));
}

function saveState() {
  localStorage.setItem('greycrm_v3', JSON.stringify(STATE));
}

// ======================================================
// UTILITIES
// ======================================================
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtN(n) {
  return Number(n || 0).toLocaleString('es-MX');
}

function fmtC(n) {
  return '$' + fmtN(n);
}

function initials(name) {
  return (name || '?').split(' ').map(function(w){ return w[0]; }).join('').substr(0, 2).toUpperCase();
}

function today() {
  return new Date().toISOString().split('T')[0];
}

// ======================================================
// TOAST
// ======================================================
function toast(msg, type) {
  type = type || 'success';
  var colors = {success:'#10b981', error:'#ef4444', warning:'#f59e0b', info:'#3b82f6'};
  var icons = {success:'OK', error:'X', warning:'!', info:'i'};
  var el = document.createElement('div');
  el.style.cssText = 'background:' + (colors[type]||'#10b981') + ';color:white;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.4);pointer-events:auto;transition:opacity 0.3s;max-width:320px;';
  el.textContent = msg;
  var c = document.getElementById('toast-container');
  c.appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; setTimeout(function(){ if(el.parentNode) el.remove(); }, 300); }, 3500);
}

// ======================================================
// MODAL
// ======================================================
function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer || '';
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });
document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target === this) closeModal(); });

// ======================================================
// NAVIGATION
// ======================================================
var currentSection = 'dashboard';

function showSection(name) {
  document.querySelectorAll('.section').forEach(function(s){ s.style.display = 'none'; });
  var sec = document.getElementById('section-' + name);
  if (sec) {
    sec.style.display = (name === 'messages' || name === 'kanban') ? 'flex' : 'block';
  }
  currentSection = name;
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  var ni = document.querySelector('[data-nav="' + name + '"]');
  if (ni) ni.classList.add('active');
  var renders = {
    dashboard: renderDashboard,
    messages: renderMessages,
    kanban: renderKanban,
    customers: renderCustomers,
    inventory: renderInventory,
    technician: renderTechnician,
    metaads: renderMetaAds,
    settings: renderSettings
  };
  if (renders[name]) renders[name]();
}

// ======================================================
// SIDEBAR
// ======================================================
function renderSidebar() {
  var logoHTML;
  if (STATE.company.logo) {
    logoHTML = '<img src="' + STATE.company.logo + '" style="width:36px;height:36px;border-radius:8px;object-fit:cover;">';
  } else {
    logoHTML = '<div style="width:36px;height:36px;border-radius:8px;background:#3b82f6;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:16px;">' + esc(STATE.company.name.charAt(0)) + '</div>';
  }

  var navItems = [
    {id:'dashboard', label:'Dashboard'},
    {id:'messages', label:'Mensajes'},
    {id:'kanban', label:'Pipeline'},
    {id:'customers', label:'Clientes'},
    {id:'inventory', label:'Inventario'},
    {id:'technician', label:'Tecnicos'},
    {id:'metaads', label:'Meta Ads'},
    {id:'settings', label:'Ajustes'}
  ];

  var navHTML = '';
  navItems.forEach(function(item) {
    var active = currentSection === item.id ? ' active' : '';
    navHTML += '<div class="nav-item' + active + '" data-nav="' + item.id + '" onclick="showSection(\'' + item.id + '\')">';
    navHTML += '<span>' + item.label + '</span>';
    navHTML += '</div>';
  });

  document.getElementById('sidebar').innerHTML =
    '<div class="sidebar-header">' +
      logoHTML +
      '<div style="margin-left:10px;overflow:hidden;">' +
        '<div style="font-weight:700;font-size:13px;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(STATE.company.name) + '</div>' +
        '<div style="font-size:11px;color:#64748b;">CRM Pro</div>' +
      '</div>' +
    '</div>' +
    '<nav style="flex:1;padding:8px 0;overflow-y:auto;">' + navHTML + '</nav>' +
    '<div style="padding:12px 16px;border-top:1px solid #334155;">' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
        '<div style="width:32px;height:32px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:12px;color:#94a3b8;flex-shrink:0;">AD</div>' +
        '<div><div style="font-size:12px;font-weight:600;color:#f8fafc;">Admin</div><div style="font-size:10px;color:#64748b;">Administrador</div></div>' +
      '</div>' +
    '</div>';
}

// ======================================================
// DASHBOARD
// ======================================================
var revenueChart = null;
var channelChart = null;

function renderDashboard() {
  var prods = STATE.products;
  var leads = STATE.leads;
  var lowStock = prods.filter(function(p){ return p.stock > 0 && p.stock <= p.minStock; }).length;
  var outStock = prods.filter(function(p){ return p.stock === 0; }).length;
  var wonLeads = leads.filter(function(l){ return l.stage === 'GANADO'; });
  var totalRevenue = wonLeads.reduce(function(s,l){ return s + (l.value||0); }, 0);
  var pipelineValue = leads.filter(function(l){ return l.stage !== 'GANADO' && l.stage !== 'PERDIDO'; }).reduce(function(s,l){ return s + (l.value||0); }, 0);
  var alertCount = lowStock + outStock;

  var recentLeads = leads.slice().reverse().slice(0, 5);
  var alertProds = prods.filter(function(p){ return p.stock <= p.minStock; }).slice(0, 5);

  var leadsHTML = '';
  recentLeads.forEach(function(l) {
    leadsHTML += '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #334155;">' +
      '<div><div style="font-size:13px;font-weight:600;color:#f8fafc;">' + esc(l.name) + '</div>' +
      '<div style="font-size:11px;color:#64748b;">' + esc(l.source) + '</div></div>' +
      '<div style="text-align:right;"><div style="font-size:13px;font-weight:600;color:#10b981;">' + fmtC(l.value) + '</div>' +
      '<span style="font-size:10px;background:#334155;padding:2px 6px;border-radius:4px;color:#94a3b8;">' + esc(stageLabel(l.stage)) + '</span></div>' +
    '</div>';
  });

  var alertHTML = alertProds.length === 0
    ? '<div style="color:#64748b;font-size:13px;text-align:center;padding:20px;">Sin alertas de inventario</div>'
    : '';
  alertProds.forEach(function(p) {
    var sc = p.stock === 0 ? '#ef4444' : '#f59e0b';
    var sl = p.stock === 0 ? 'SIN STOCK' : 'BAJO';
    alertHTML += '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #334155;">' +
      '<div><div style="font-size:13px;font-weight:600;color:#f8fafc;">' + esc(p.name) + '</div>' +
      '<div style="font-size:11px;color:#64748b;">Min: ' + p.minStock + '</div></div>' +
      '<div style="text-align:right;"><div style="font-size:20px;font-weight:700;color:' + sc + ';">' + p.stock + '</div>' +
      '<div style="font-size:10px;color:' + sc + ';">' + sl + '</div></div>' +
    '</div>';
  });

  document.getElementById('section-dashboard').innerHTML =
    '<div style="padding:24px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">' +
        '<div><h1 style="font-size:22px;font-weight:700;color:#f8fafc;margin:0;">Dashboard</h1>' +
        '<p style="color:#64748b;margin:4px 0 0;font-size:13px;">Resumen general del negocio</p></div>' +
        '<div style="color:#64748b;font-size:13px;">' + today() + '</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px;">' +
        kpiCard('Ingresos Ganados', fmtC(totalRevenue), '#10b981', wonLeads.length + ' ventas cerradas') +
        kpiCard('Pipeline Total', fmtC(pipelineValue), '#3b82f6', leads.filter(function(l){ return l.stage!=='GANADO'&&l.stage!=='PERDIDO';}).length + ' leads activos') +
        kpiCard('Clientes', STATE.customers.length, '#8b5cf6', 'Base de clientes') +
        kpiCard('Alertas Stock', alertCount, alertCount > 0 ? '#ef4444' : '#10b981', outStock + ' sin stock') +
      '</div>' +
      '<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px;">' +
        '<div class="card"><div style="font-weight:600;color:#f8fafc;margin-bottom:16px;">Ingresos por Mes</div>' +
        '<div style="position:relative;height:180px;"><canvas id="revenueChart"></canvas></div></div>' +
        '<div class="card"><div style="font-weight:600;color:#f8fafc;margin-bottom:16px;">Leads por Canal</div>' +
        '<div style="position:relative;height:180px;"><canvas id="channelChart"></canvas></div></div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">' +
        '<div class="card"><div style="font-weight:600;color:#f8fafc;margin-bottom:12px;">Leads Recientes</div>' + leadsHTML +
        '<button class="btn btn-ghost" style="margin-top:12px;width:100%;font-size:13px;" onclick="showSection(\'kanban\')">Ver Pipeline Completo</button></div>' +
        '<div class="card"><div style="font-weight:600;color:#f8fafc;margin-bottom:12px;">Alertas Inventario</div>' + alertHTML +

function renderMovementsTable(el) {
  var movs = STATE.movements.slice().reverse();
  var rows = '';
  if (movs.length === 0) {
    rows = '<tr><td colspan="6" style="text-align:center;color:#64748b;padding:30px;">Sin movimientos registrados</td></tr>';
  } else {
    movs.forEach(function(m) {
      var prod = STATE.products.find(function(p){ return p.id === m.productId; });
      var isIn = m.type === 'in';
      rows += '<tr>' +
        '<td style="color:#64748b;font-size:12px;">' + esc(m.date) + '</td>' +
        '<td style="font-weight:600;color:#f8fafc;">' + esc(prod ? prod.name : '(eliminado)') + '</td>' +
        '<td><span class="badge" style="background:' + (isIn?'rgba(16,185,129,0.15)':'rgba(239,68,68,0.15)') + ';color:' + (isIn?'#10b981':'#ef4444') + ';">' + (isIn?'ENTRADA':'SALIDA') + '</span></td>' +

    '<table class="table"><thead><tr>' +

function saveNewProduct() {
  var name = gv('name'), sku = gv('sku'), category = gv('category');
  var stock = parseInt(gv('stock'))||0, minStock = parseInt(gv('minStock'))||0;
  var maxStock = parseInt(gv('maxStock'))||100, cost = parseFloat(gv('cost'))||0;
  if (!name) { toast('El nombre es requerido'); return; }
  if (!sku) { toast('El SKU es requerido'); return; }
  var prod = {id:uid(), name:name, sku:sku, category:category||'General', stock:stock, minStock:minStock, maxStock:maxStock, cost:cost};

  if (stock > 0) {
    STATE.movements.push({id:uid(), productId:prod.id, type:'in', qty:stock, reason:'Stock inicial', date:today(), user:'Admin'});
  }
  saveState(); closeModal();

function openStockMove(id, type) {
  var p = STATE.products.find(function(x){ return x.id===id; });
  if (!p) return;
  var title = type === 'in' ? 'Entrada de Stock' : 'Salida de Stock';
  openModal(title + ' — ' + esc(p.name),
    '<div style="background:#334155;border-radius:8px;padding:12px;margin-bottom:16px;display:flex;justify-content:space-around;">' +
      '<div style="text-align:center;"><div style="font-size:11px;color:#94a3b8;">Actual</div><div style="font-size:22px;font-weight:700;color:#f8fafc;">' + p.stock + '</div></div>' +
      '<div style="text-align:center;"><div style="font-size:11px;color:#94a3b8;">Minimo</div><div style="font-size:22px;font-weight:700;color:#f59e0b;">' + p.minStock + '</div></div>' +
      '<div style="text-align:center;"><div style="font-size:11px;color:#94a3b8;">Maximo</div><div style="font-size:22px;font-weight:700;color:#10b981;">' + p.maxStock + '</div></div>' +
    '</div>' +
    fld('qty','Cantidad','number','1','5') +
    '<div style="margin-top:12px;">' + fld('reason','Motivo','text','',type==='in'?'Compra a proveedor':'Venta / Instalacion') + '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>' +
    '<button class="btn ' + (type==='in'?'btn-success':'btn-danger') + '" onclick="saveStockMove(\'' + id + '\',\'' + type + '\')">' + title + '</button>'
  );
}

function saveStockMove(id, type) {
  var p = STATE.products.find(function(x){ return x.id===id; });
  if (!p) return;
  var qty = parseInt(gv('qty'))||0;
  var reason = gv('reason');
  if (qty <= 0) { toast('La cantidad debe ser mayor a 0'); return; }
  if (type === 'out' && qty > p.stock) { toast('Stock insuficiente (actual: ' + p.stock + ')'); return; }
  p.stock = type === 'in' ? p.stock + qty : p.stock - qty;
  STATE.movements.push({id:uid(), productId:id, type:type, qty:qty, reason:reason||'-', date:today(), user:'Admin'});
  saveState(); closeModal();
  toast((type==='in'?'+':'-') + qty + ' unidades en ' + p.name);
  renderInventory();
}

function deleteProduct(id) {
  var p = STATE.products.find(function(x){ return x.id===id; });
  if (!p) return;
  openModal('Eliminar Producto',
    '<div style="text-align:center;padding:20px;">' +
      '<div style="font-size:44px;margin-bottom:12px;">?</div>' +
      '<div style="color:#f8fafc;font-weight:600;margin-bottom:8px;">Eliminar ' + esc(p.name) + '?</div>' +
      '<div style="color:#94a3b8;font-size:13px;">Esta accion no se puede deshacer.</div>' +
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>' +
    '<button class="btn btn-danger" onclick="confirmDeleteProduct(\'' + id + '\')">Si, Eliminar</button>'
  );
}

function confirmDeleteProduct(id) {
  var p = STATE.products.find(function(x){ return x.id===id; });
  STATE.products = STATE.products.filter(function(x){ return x.id!==id; });
  saveState(); closeModal();
  toast('Producto eliminado: ' + (p?p.name:''));
  renderInventory();
}

// ======================================================
var STAGES = ['NUEVO_LEAD','CONTACTADO','COTIZADO','NEGOCIACION','PAGO_PENDIENTE','GANADO','PERDIDO'];
var STAGE_LABELS = {
  NUEVO_LEAD:'Nuevo Lead', CONTACTADO:'Contactado', COTIZADO:'Cotizado',
  NEGOCIACION:'Negociacion', PAGO_PENDIENTE:'Pago Pendiente',
  GANADO:'Ganado', PERDIDO:'Perdido'
};

function stageLabel(s) { return STAGE_LABELS[s] || s; }

function renderKanban() {
  var activeStages = ['NUEVO_LEAD','CONTACTADO','COTIZADO','NEGOCIACION','PAGO_PENDIENTE'];
  var cols = '';

  activeStages.forEach(function(stage) {
    var stageLeads = STATE.leads.filter(function(l){ return l.stage === stage; });
    var stageTotal = stageLeads.reduce(function(s,l){ return s+(l.value||0); }, 0);
    var cards = '';
    stageLeads.forEach(function(l) {
      cards += '<div class="kanban-card" onclick="openEditLead(\'' + l.id + '\')">' +
        '<div style="font-weight:600;font-size:13px;color:#f8fafc;margin-bottom:3px;">' + esc(l.name) + '</div>' +
        '<div style="font-size:12px;color:#94a3b8;margin-bottom:8px;">' + esc(l.phone) + '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span style="font-size:13px;font-weight:700;color:#10b981;">' + fmtC(l.value) + '</span>' +
          '<span class="badge" style="background:#334155;color:#94a3b8;">' + esc(l.source) + '</span>' +
        '</div>' +
        (l.assigned ? '<div style="font-size:11px;color:#64748b;margin-top:6px;">Asig: ' + esc(l.assigned) + '</div>' : '') +
      '</div>';
    });

    cols += '<div class="kanban-col">' +
      '<div class="kanban-col-header"><span>' + stageLabel(stage) + '</span>' +
      '<span class="badge" style="background:#334155;color:#94a3b8;">' + stageLeads.length + '</span></div>' +
      '<div style="font-size:12px;color:#64748b;margin-bottom:10px;">' + fmtC(stageTotal) + '</div>' +
      cards +
    '</div>';
  });

var activeConvId = null;

function renderMessages() {

    var last = c.messages[c.messages.length - 1];
    var isActive = c.id === activeConvId;
    convListHTML += '<div class="conv-item' + (isActive?' active':'') + '" onclick="selectConv(\'' + c.id + '\')">' +
      '<div style="width:40px;height:40px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-weight:700;color:#60a5fa;flex-shrink:0;">' + initials(c.name) + '</div>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:2px;">' +
          '<span style="font-weight:600;font-size:13px;color:#f8fafc;">' + esc(c.name) + '</span>' +
          ((c.unread||0) > 0 ? '<span style="background:#3b82f6;color:white;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;">' + c.unread + '</span>' : '') +
        '</div>' +
        '<div style="font-size:12px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc((last ? last.text : 'Sin mensajes').substring(0,40)) + '</div>' +
        '<div style="font-size:11px;color:#475569;margin-top:2px;">' + esc(c.channel||'WhatsApp') + '</div>' +
      '</div>' +
    '</div>';
  });

  var chatHTML = '';
  if (conv) {
    var msgsHTML = '';
    conv.messages.forEach(function(m) {
      var isOut = m.dir === 'out';
      msgsHTML += '<div style="display:flex;justify-content:' + (isOut?'flex-end':'flex-start') + ';margin-bottom:10px;">' +
        '<div style="max-width:70%;background:' + (isOut?'#1e3a5f':'#334155') + ';padding:10px 14px;border-radius:' + (isOut?'16px 16px 4px 16px':'16px 16px 16px 4px') + ';">' +
          '<div style="font-size:14px;color:#f8fafc;">' + esc(m.text) + '</div>' +
          '<div style="font-size:11px;color:#64748b;margin-top:4px;text-align:right;">' + esc(m.time||'') + (m.status?' - '+esc(m.status):'') + '</div>' +
        '</div>' +
      '</div>';
    });

    chatHTML =
      '<div style="padding:14px 16px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
          '<div style="width:36px;height:36px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-weight:700;color:#60a5fa;">' + initials(conv.name) + '</div>' +
          '<div><div style="font-weight:600;color:#f8fafc;">' + esc(conv.name) + '</div>' +
          '<div style="font-size:12px;color:#64748b;">' + esc(conv.channel||'WhatsApp') + '</div></div>' +
        '</div>' +
        '<div style="display:flex;gap:6px;">' +
          '<button class="btn btn-sm btn-ghost" onclick="createLeadFromConv(\'' + conv.id + '\')">Lead</button>' +
          '<button class="btn btn-sm btn-ghost" onclick="closeConv(\'' + conv.id + '\')">Cerrar</button>' +
        '</div>' +
      '</div>' +
      '<div id="chat-msgs" style="flex:1;overflow-y:auto;padding:16px;">' + msgsHTML + '</div>' +
      '<div style="padding:14px 16px;border-top:1px solid #334155;display:flex;gap:8px;flex-shrink:0;">' +
        '<input type="text" id="msg-input" class="input" style="flex:1;" placeholder="Escribe un mensaje..." onkeydown="if(event.key===\'Enter\')sendMessage(\'' + conv.id + '\')">' +
        '<button class="btn btn-primary" onclick="sendMessage(\'' + conv.id + '\')">Enviar</button>' +
      '</div>';
  } else {
    chatHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;">Selecciona una conversacion</div>';
  }

  document.getElementById('section-messages').innerHTML =
    '<div style="width:270px;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0;">' +
      '<div style="padding:14px 16px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;">' +
        '<span style="font-weight:700;color:#f8fafc;font-size:15px;">Mensajes</span>' +

    '</div>' +
    '<div style="flex:1;display:flex;flex-direction:column;min-width:0;">' + chatHTML + '</div>';

  requestAnimationFrame(function() {
    var cd = document.getElementById('chat-msgs');
    if (cd) cd.scrollTop = cd.scrollHeight;
  });
}

function sendMessage(convId) {
  var inp = document.getElementById('msg-input');
  var text = inp ? inp.value.trim() : '';

  var conv = STATE.conversations.find(function(c){ return c.id===convId; });

  conv.messages.push({
    id:uid(), text:text, dir:'out',

    status:'Enviado'

function renderMetaAds() {
  var campaigns = [
    {name:'Camaras CDMX Q2 2026',status:'Activa',budget:8000,spent:6240,leads:34,cpl:183,channel:'Facebook'},
    {name:'Alarmas Residenciales',status:'Activa',budget:5000,spent:4100,leads:22,cpl:186,channel:'Instagram'},
    {name:'Kit Seguridad Empresas',status:'Pausada',budget:12000,spent:9800,leads:41,cpl:239,channel:'Facebook'},
    {name:'Retargeting Website',status:'Activa',budget:3000,spent:2100,leads:18,cpl:117,channel:'Facebook+IG'}
  ];

  var totalLeads = campaigns.reduce(function(s,c){ return s+c.leads; }, 0);
  var totalSpent = campaigns.reduce(function(s,c){ return s+c.spent; }, 0);
  var totalBudget = campaigns.reduce(function(s,c){ return s+c.budget; }, 0);
  var avgCpl = Math.round(totalSpent / totalLeads);

  var rows = '';
  campaigns.forEach(function(c) {
    var pct = Math.round((c.spent/c.budget)*100);
    var sc = c.status === 'Activa' ? '#10b981' : '#f59e0b';
    rows += '<div class="card" style="margin-bottom:14px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">' +
        '<div><div style="font-weight:600;color:#f8fafc;">' + esc(c.name) + '</div>' +
        '<div style="font-size:12px;color:#64748b;margin-top:2px;">' + esc(c.channel) + '</div></div>' +
        '<span class="badge" style="background:' + sc + '20;color:' + sc + ';">' + c.status + '</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;">' +
        mBox('Presupuesto', fmtC(c.budget)) +
        mBox('Gastado', fmtC(c.spent)) +
        mBox('Leads', c.leads) +
        mBox('CPL', fmtC(c.cpl)) +
      '</div>' +
      '<div style="height:6px;background:#334155;border-radius:3px;">' +
        '<div style="width:' + pct + '%;height:100%;background:' + (pct>90?'#ef4444':'#3b82f6') + ';border-radius:3px;"></div>' +
      '</div>' +
      '<div style="font-size:11px;color:#64748b;margin-top:4px;">' + pct + '% del presupuesto utilizado</div>' +
    '</div>';
  });

  document.getElementById('section-metaads').innerHTML =
    '<div style="padding:24px;">' +
      '<div style="margin-bottom:24px;"><h1 style="font-size:22px;font-weight:700;color:#f8fafc;margin:0;">Meta Ads</h1>' +
      '<p style="color:#64748b;margin:4px 0 0;font-size:13px;">Campanas de Facebook e Instagram</p></div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px;">' +
        kpiCard('Total Leads', totalLeads, '#3b82f6', 'este mes') +
        kpiCard('Gasto Total', fmtC(totalSpent), '#ef4444', 'de ' + fmtC(totalBudget)) +
        kpiCard('CPL Promedio', fmtC(avgCpl), '#8b5cf6', 'costo por lead') +
        kpiCard('Activas', campaigns.filter(function(c){ return c.status==='Activa'; }).length, '#10b981', 'de ' + campaigns.length + ' total') +
      '</div>' +
      rows +
    '</div>';
}

function mBox(label, value) {
  return '<div style="background:#334155;border-radius:8px;padding:10px;text-align:center;">' +
    '<div style="font-size:11px;color:#94a3b8;margin-bottom:4px;">' + label + '</div>' +
    '<div style="font-weight:700;color:#f8fafc;font-size:14px;">' + value + '</div>' +

  var logoPreview = logo
    ? '<img src="' + logo + '" style="width:72px;height:72px;border-radius:12px;object-fit:cover;">'
    : '<div style="width:72px;height:72px;border-radius:12px;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#60a5fa;">' + esc(STATE.company.name.charAt(0)) + '</div>';

  document.getElementById('section-settings').innerHTML =
    '<div style="padding:24px;max-width:600px;">' +
      '<h1 style="font-size:22px;font-weight:700;color:#f8fafc;margin-bottom:24px;">Configuracion</h1>' +

      '<div class="card" style="margin-bottom:16px;">' +
        '<div style="font-weight:600;color:#f8fafc;margin-bottom:16px;">Informacion de la Empresa</div>' +
        '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">' +
          logoPreview +
          '<div>' +
            '<div style="font-weight:600;color:#f8fafc;margin-bottom:10px;">' + esc(STATE.company.name) + '</div>' +
            '<label class="btn btn-sm btn-ghost" style="cursor:pointer;display:inline-block;">' +
              'Cambiar Logo' +
              '<input type="file" accept="image/*" style="display:none;" onchange="uploadLogo(this)">' +
            '</label>' +
            (logo ? '<button class="btn btn-sm btn-danger" style="margin-left:8px;" onclick="removeLogo()">Quitar Logo</button>' : '') +
            '<div style="font-size:11px;color:#64748b;margin-top:6px;">JPG, PNG, GIF - max 2MB</div>' +
          '</div>' +
        '</div>' +
        '<label class="form-label">Nombre de la Empresa</label>' +
        '<div style="display:flex;gap:8px;">' +
          '<input type="text" id="company-name-inp" class="input" value="' + esc(STATE.company.name) + '" style="flex:1;">' +
          '<button class="btn btn-primary" onclick="saveCompanyName()">Guardar</button>' +
        '</div>' +
      '</div>' +

      '<div class="card" style="margin-bottom:16px;">' +
        '<div style="font-weight:600;color:#f8fafc;margin-bottom:12px;">Estadisticas</div>' +
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">' +
          mBox('Productos', STATE.products.length) +
          mBox('Clientes', STATE.customers.length) +
          mBox('Leads', STATE.leads.length) +
          mBox('Movimientos', STATE.movements.length) +
        '</div>' +
        '<button class="btn btn-danger" onclick="confirmReset()">Resetear Todos los Datos (Demo)</button>' +
      '</div>' +

      '<div class="card">' +
        '<div style="font-weight:600;color:#f8fafc;margin-bottom:6px;">GreyCRM Demo Interactiva v3.0</div>' +
        '<div style="font-size:13px;color:#64748b;">Los datos se guardan en localStorage del navegador. Funciona sin conexion a internet.</div>' +
      '</div>' +
    '</div>';
}

function uploadLogo(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { toast('La imagen debe ser menor a 2MB'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    STATE.company.logo = e.target.result;
    saveState(); renderSidebar(); renderSettings();
    toast('Logo actualizado');
  };
  reader.readAsDataURL(file);
}

function removeLogo() {
  STATE.company.logo = null;
  saveState(); renderSidebar(); renderSettings();
  toast('Logo removido');
}

function saveCompanyName() {
  var inp = document.getElementById('company-name-inp');
  var name = inp ? inp.value.trim() : '';
  if (!name) { toast('El nombre no puede estar vacio'); return; }
  STATE.company.name = name;
  saveState(); renderSidebar(); toast('Nombre actualizado: ' + name);
}

function confirmReset() {
  openModal('Resetear todos los datos?',
    '<div style="text-align:center;padding:24px;">' +
      '<div style="color:#f8fafc;font-weight:600;font-size:16px;margin-bottom:8px;">Se perderan todos los cambios realizados.</div>' +
      '<div style="color:#94a3b8;font-size:13px;">Los datos volvaran al estado inicial de la demo.</div>' +
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>' +
    '<button class="btn btn-danger" onclick="doReset()">Si, Resetear Todo</button>'
  );
}

function doReset() {
  localStorage.removeItem('greycrm_v3');
  location.reload();
}

// ======================================================
// FORM HELPERS
// ======================================================
function fld(key, label, type, defVal, placeholder) {
  return '<div>' +
    '<label class="form-label">' + label + '</label>' +
    '<input type="' + type + '" id="f-' + key + '" class="input" value="' + esc(String(defVal||'')) + '" placeholder="' + esc(placeholder||'') + '">' +
  '</div>';
}

function fldv(key, label, type, value) {
  return '<div>' +
    '<label class="form-label">' + label + '</label>' +
    '<input type="' + type + '" id="f-' + key + '" class="input" value="' + esc(String(value == null ? '' : value)) + '">' +
  '</div>';
}

function fldSel(key, label, options, selected) {
  var opts = '';
  options.forEach(function(o) {
    opts += '<option value="' + esc(o) + '"' + (selected===o?' selected':'') + '>' + esc(o) + '</option>';
  });
  return '<div>' +
    '<label class="form-label">' + label + '</label>' +
    '<select id="f-' + key + '" class="input">' + opts + '</select>' +
  '</div>';
}

function gv(key) {
  var el = document.getElementById('f-' + key);
  return el ? el.value.trim() : '';
}

// ======================================================
// INIT
// ======================================================
window.addEventListener('load', function() {
  loadState();
  document.querySelectorAll('.section').forEach(function(s){ s.style.display = 'none'; });
  renderSidebar();
  showSection('dashboard');
});
</script>
</body>
</html>
